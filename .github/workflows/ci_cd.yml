name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v6

    #Authenticate with AWS using GitHub Action and add AWS credentials to source
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    # Generate a key pair for GitHub Action to use to authenticate with the EC2 instance and add weather API secret to source
    - name: Generate SSH Key
      run: ssh-keygen -t ed25519 -f ~/.ssh/aws_ec2_key -N ""

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    # Delete any existing infrastructure according to Terraform configuration files before building or changing infrastructure according to Terraform configuration files to ensure that the EC2 instance is always recreated with the new SSH key and weather API key
    - name: Terraform Destroy
      run: terraform destroy -auto-approve
      working-directory: ./terraform

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      run: terraform fmt -check
      working-directory: ./terraform

    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false
      working-directory: ./terraform

      # On push to "main", build or change infrastructure according to Terraform configuration files
      # Note: It is recommended to set up a required "strict" status check in your repository for "Terraform Cloud". See the documentation on "strict" required status checks for more information: https://help.github.com/en/github/administering-a-repository/types-of-required-status-checks
    - name: Terraform Apply
      run: terraform apply -auto-approve -replace="aws_instance.app_server"
      working-directory: ./terraform

    - name: Wait for EC2
      run: |
        for i in {1..30}; do
          ssh -i ~/.ssh/aws_ec2_key -o "StrictHostKeyChecking=no" -o "ConnectTimeout=5" ubuntu@$(terraform -chdir=./terraform output -raw public_ip) "echo connected" && break
          echo "Attempt $i failed, retrying in 10s..."
          sleep 10
        done

    # Copy the generated SSH key to the EC2 instance and add the GitHub SSH key as a deploy key to the EC2 instance for authentication when cloning the GitHub repository
    - name: Copy GitHub SSH key to EC2
      run: |
        ssh -i ~/.ssh/aws_ec2_key -o "StrictHostKeyChecking=no" ubuntu@$(terraform -chdir=./terraform output -raw public_ip) "mkdir -p ~/.ssh && echo '${{ secrets.GH_SSH_KEY }}' > ~/.ssh/gh_deploy_key && chmod 600 ~/.ssh/gh_deploy_key"


      #SSH into EC2 instance and install docker
    - name: Deploy to EC2 instance
      run: ssh -i ~/.ssh/aws_ec2_key -o "StrictHostKeyChecking=no" ubuntu@$(terraform -chdir=./terraform output -raw public_ip) "GIT_SSH_COMMAND='ssh -i ~/.ssh/gh_deploy_key -o StrictHostKeyChecking=no' git clone git@github.com:joshuamccausey/01_devopsapi.git && cd 01_devopsapi && sudo docker build -t devopsapi . && sudo docker run -d -p 8000:8000 -e OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }} devopsapi"



#
      # Need following code to add api key to source code
        #env:
        #  OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}